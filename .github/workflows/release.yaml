on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

name: release-please
jobs:
  release-please:
    if: ${{ contains (github.repository, '/terraform-gcp-template') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Confirm README.md is up to date.
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: .
          fail-on-diff: true
          config-file: .terraform-docs.yml

      - name: Release Please
        uses: googleapis/release-please-action@v5.0.0
        with:
          release-type: terraform-module
